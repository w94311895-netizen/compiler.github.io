[build]
  publish = "."

# Cache control headers - prevent stale content issues
[[headers]]
  for = "/"
  [headers.values]
    # HTML pages should not be cached to prevent stale content
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Static assets - aggressive caching with version strings
[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/script.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"
    Content-Type = "image/svg+xml"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

# Security headers for all
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "default-src 'self' https: data: 'unsafe-inline'; script-src 'self' https: 'unsafe-inline' https://cdn.jsdelivr.net https://cdn.pyodide.org https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net; style-src 'self' https: 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https: data: https://fonts.gstatic.com; img-src 'self' https: data:; connect-src 'self' https: wss:;"

# Redirect old python-errors extension
[[redirects]]
  from = "/python-errors.htm"
  to = "/python-errors.html"
  status = 301

# Force HTTPS
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true
